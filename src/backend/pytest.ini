[pytest]
# Configuración para tests del backend (Fase 1: Consolidate Domain Core - Hexagonal Refactor)
# Permite correr tests de dominio puro (characterization de api/logic/domain/* strategies + service + factory)
# sin necesidad de Django settings. Estos tests protegen el núcleo existente antes de extracciones a core/.

addopts = -q --tb=short --cov=api --cov-report=term-missing --cov-report=html
pythonpath = .
testpaths = tests
python_files = test_*.py *_tests.py
norecursedirs = __pycache__ .git

# Coverage configuration for characterization tests (Fase 0/1+)
# Run with: pytest --cov=api --cov-report=term-missing  (from src/backend)
# Note: For full coverage, run from src/backend after installing pytest-cov (see requirements.txt)
# Domain focus: see .coveragerc ; tests growing per Sec 7.8 TODO (historico edges, switches, etc.)
# Future: uncomment DJANGO for integration tests when vertical slices start (higher risk phase)

# Para tests que usen Django en el futuro:
# DJANGO_SETTINGS_MODULE = sigct_backend.settings
# django_find_project = false