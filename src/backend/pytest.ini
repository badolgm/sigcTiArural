[pytest]
# Configuración para tests del backend (Fase 0 refactor hexagonal)
# Permite correr tests de dominio puro sin necesidad de Django settings

addopts = -q --tb=short --cov=api --cov-report=term-missing --cov-report=html
pythonpath = .
testpaths = tests
python_files = test_*.py *_tests.py
norecursedirs = __pycache__ .git

# Coverage configuration for characterization tests (Fase 0+)
# Run with: pytest --cov=src/backend --cov-report=term-missing
# Note: For full coverage, run from src/backend after installing pytest-cov
# Future: uncomment DJANGO for integration tests

# Para tests que usen Django en el futuro:
# DJANGO_SETTINGS_MODULE = sigct_backend.settings
# django_find_project = false