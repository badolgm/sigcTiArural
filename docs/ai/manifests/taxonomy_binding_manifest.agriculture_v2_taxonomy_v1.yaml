    canonical_class_id: "potato__late_blight"

  - original_class_name: "Corn_(maize)___healthy"
    species: "corn"
    condition_group: "healthy"
    condition_name: "healthy"
    health_state: "healthy"
    semantic_code: "agriculture.corn.healthy.healthy"
    canonical_class_id: "corn__healthy"
  - original_class_name: "Corn_(maize)___Cercospora_leaf_spot Gray_leaf_spot"
    species: "corn"
    condition_group: "disease"
    condition_name: "cercospora_gray_leaf_spot"
    health_state: "warning"
    semantic_code: "agriculture.corn.disease.cercospora_gray_leaf_spot"
    canonical_class_id: "corn__cercospora_gray_leaf_spot"
  - original_class_name: "Corn_(maize)___Common_rust_"
    species: "corn"
