schema_version: "1.0"
manifest_type: "taxonomy_binding_manifest"

taxonomy_version: "agriculture_v2_taxonomy_v1"
label_schema_version: "agriculture_v2_label_schema_v1"
context: "agriculture"
modality: "computer_vision"

inputs:
  raw_source_manifest: "raw_source_manifest.agriculture_v2_dataset_v1.yaml"
  curation_manifest: "curation_manifest.agriculture_v2_dataset_v1.yaml"

binding_rules:
  class_name_source: "folder_name"
  delimiter: "___"
  note: "El binding normaliza nombres de PlantVillage y los enlaza con taxonomía EIARC V2 (sin depender de class_index)."

bindings:
  - original_class_name: "Tomato___healthy"
    species: "tomato"
    condition_group: "healthy"
    condition_name: "healthy"
    health_state: "healthy"
    semantic_code: "agriculture.tomato.healthy.healthy"
    canonical_class_id: "tomato__healthy"
  - original_class_name: "Tomato___Early_blight"
    species: "tomato"
    condition_group: "disease"
    condition_name: "early_blight"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.early_blight"
    canonical_class_id: "tomato__early_blight"
  - original_class_name: "Tomato___Late_blight"
    species: "tomato"
    condition_group: "disease"
    condition_name: "late_blight"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.late_blight"
    canonical_class_id: "tomato__late_blight"
  - original_class_name: "Tomato___Leaf_Mold"
    species: "tomato"
    condition_group: "disease"
    condition_name: "leaf_mold"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.leaf_mold"
    canonical_class_id: "tomato__leaf_mold"
  - original_class_name: "Tomato___Septoria_leaf_spot"
    species: "tomato"
    condition_group: "disease"
    condition_name: "septoria_leaf_spot"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.septoria_leaf_spot"
    canonical_class_id: "tomato__septoria_leaf_spot"
  - original_class_name: "Tomato___Bacterial_spot"
    species: "tomato"
    condition_group: "disease"
    condition_name: "bacterial_spot"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.bacterial_spot"
    canonical_class_id: "tomato__bacterial_spot"
  - original_class_name: "Tomato___Target_Spot"
    species: "tomato"
    condition_group: "disease"
    condition_name: "target_spot"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.target_spot"
    canonical_class_id: "tomato__target_spot"
  - original_class_name: "Tomato___Tomato_mosaic_virus"
    species: "tomato"
    condition_group: "disease"
    condition_name: "mosaic_virus"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.mosaic_virus"
    canonical_class_id: "tomato__mosaic_virus"
  - original_class_name: "Tomato___Tomato_Yellow_Leaf_Curl_Virus"
    species: "tomato"
    condition_group: "disease"
    condition_name: "yellow_leaf_curl_virus"
    health_state: "warning"
    semantic_code: "agriculture.tomato.disease.yellow_leaf_curl_virus"
    canonical_class_id: "tomato__yellow_leaf_curl_virus"

  - original_class_name: "Potato___healthy"
    species: "potato"
    condition_group: "healthy"
    condition_name: "healthy"
    health_state: "healthy"
    semantic_code: "agriculture.potato.healthy.healthy"
    canonical_class_id: "potato__healthy"
  - original_class_name: "Potato___Early_blight"
    species: "potato"
    condition_group: "disease"
    condition_name: "early_blight"
    health_state: "warning"
    semantic_code: "agriculture.potato.disease.early_blight"
