# version: '3.8'   #Comento esta linea porque estaba tirando un error de versión

services:
  # Base de datos PostgreSQL (Donde inyectamos sigctiarural_db)
  db:
    image: postgres:15
    container_name: sigctiarural_postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5544}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Base de datos MySQL - residuo de la migración pre-Postgres (commit 3ed04e6 -> f7732122).
  # Django no la usa: sin driver mysqlclient/PyMySQL en requirements.txt y sin referencias en el código.
  # Se mantiene definida por si algún script externo aún depende de ella; no bloquea el arranque del backend.
  db-mysql:
    image: mysql:8.0
    container_name: sigctiarural_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3316:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Tus servicios locales configurados para Docker
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sigctiarural_backend
    volumes:
      - ./src/backend:/app
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  ai_service:
    build:
      context: ./src/ai_models
      dockerfile: Dockerfile
    container_name: sigctiarural_ai_service
    ports:
      - "${AI_PORT:-8081}:8081"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VITE_AI_INFERENCE_URL: ${VITE_AI_INFERENCE_URL:-http://localhost:8010/api/v3/ai/inference/}
        VITE_AI_API_BASE: ${VITE_AI_API_BASE:-http://localhost:8081}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8010}
    container_name: sigctiarural_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
