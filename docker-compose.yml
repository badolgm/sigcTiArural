version: '3.8'

services:
  # Base de datos PostgreSQL (Donde inyectamos kairos_db)
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sigctia2026
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Base de datos MySQL (Donde inyectamos sigct_rural)
  db-mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: sigctia2026
    ports:
      - "3306:3306"
    restart: unless-stopped

  # Tus servicios locales configurados para Docker (Opcional si usas ventanas)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sigct_backend
    volumes:
      - ./src/backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=kairos_db
      - DB_USER=postgres
      - DB_PASSWORD=sigctia2026
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - db-mysql

  ai_service:
    build:
      context: ./src/ai_models
      dockerfile: Dockerfile
    container_name: sigct_ai_service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=db
      - DB_NAME=kairos_db
      - DB_USER=postgres
      - DB_PASSWORD=sigctia2026
    depends_on:
      - db

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: sigct_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
